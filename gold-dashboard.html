<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金鉴 · 黄金交易终端</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#07080B;
    --panel:#12141A;
    --panel-2:#181B22;
    --line:#262B35;
    --line-soft:#1D212A;
    --text:#EDEEF2;
    --text-soft:#9BA2B0;
    --text-mute:#5C6270;
    --rise:#1FAE6E;
    --rise-dim:rgba(31,174,110,0.14);
    --fall:#D14B4B;
    --fall-dim:rgba(209,75,75,0.14);
    --amber:#D4AF37;
    --amber-dim:rgba(212,175,55,0.14);
    --z1:#D4AF37; --z1-dim:rgba(212,175,55,0.13);
    --z2:#4E8FD1; --z2-dim:rgba(78,143,209,0.13);
    --z3:#D14B4B; --z3-dim:rgba(209,75,75,0.13);
    --z4:#9C7FD4; --z4-dim:rgba(156,127,212,0.13);
    --z5:#C24868; --z5-dim:rgba(194,72,104,0.13);
    --z6:#1FAE6E; --z6-dim:rgba(31,174,110,0.13);
    --z7:#3FA6AE; --z7-dim:rgba(63,166,174,0.13);
    --z8:#C6A34D; --z8-dim:rgba(198,163,77,0.13);
    --z9:#7E8CA3; --z9-dim:rgba(126,140,163,0.13);
    --z10:#5B6FC7; --z10-dim:rgba(91,111,199,0.15);
    --z11:#C77A45; --z11-dim:rgba(199,122,69,0.14);
    --z12:#3D9E92; --z12-dim:rgba(61,158,146,0.14);
    --serif:'Playfair Display', Georgia, serif;
    --radius:8px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{overflow-x:hidden;}
  body{
    overflow-x:hidden;
    background:
      radial-gradient(ellipse 900px 500px at 50% -8%, rgba(212,175,55,0.07), transparent 60%),
      radial-gradient(ellipse 700px 600px at 100% 15%, rgba(78,143,209,0.045), transparent 55%),
      linear-gradient(180deg, #08090C 0%, #07080B 40%, #06070A 100%);
    background-attachment:fixed;
    color:var(--text);
    font-family:'Inter',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
    box-shadow:0 0 60px rgba(0,0,0,0.5);
  }
  .mono{font-family:'IBM Plex Mono',monospace; font-variant-numeric:tabular-nums;}
  .serif{font-family:var(--serif);}

  /* ---- Header ---- */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(8,9,12,0.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    border-top:2px solid;
    border-image:linear-gradient(90deg, transparent, var(--amber) 25%, var(--amber) 75%, transparent) 1;
    padding:14px 16px 12px;
  }
  .brand-row{display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:8px;}
  .brand-mark{
    width:27px;height:27px;border-radius:6px;
    background:linear-gradient(155deg,#E7CD7A,var(--amber) 45%,#8A6A1E);
    display:flex;align-items:center;justify-content:center;
    color:#0A0B0D;font-weight:700;font-size:13px;font-family:'IBM Plex Mono',monospace;
    box-shadow:0 0 0 1px rgba(212,175,55,0.25), 0 2px 8px rgba(212,175,55,0.15);
  }
  .brand-name{font-family:var(--serif); font-weight:700; font-size:17.5px; letter-spacing:0.01em;}
  .live-pill{
    display:flex; align-items:center; gap:5px;
    font-size:10.5px; color:var(--text-soft); font-weight:700;
    padding:4px 9px; border:1px solid var(--line); border-radius:20px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--rise);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* ---- Broadcast bar ---- */
  .broadcast-bar{
    margin-top:12px; border:1px solid var(--line); border-left:3px solid var(--amber);
    border-radius:7px; background:var(--panel);
    padding:9px 11px; display:flex; align-items:center; gap:10px;
  }
  .bc-live{
    display:flex; align-items:center; gap:5px; flex-shrink:0;
    font-size:9.5px; font-weight:800; color:var(--amber); text-transform:uppercase; letter-spacing:.05em;
  }
  .bc-live-dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:pulse 1.4s infinite;}
  .bc-source{font-size:10px; color:var(--text-mute); font-weight:700; flex-shrink:0; border-left:1px solid var(--line); padding-left:8px;}
  .bc-scroll-wrap{flex:1; min-width:0; overflow:hidden; white-space:nowrap; position:relative; height:16px;}
  .bc-scroll-text{
    display:inline-block; font-size:12px; color:var(--text); font-weight:500;
    animation:marquee 16s linear infinite; padding-left:100%;
  }
  @keyframes marquee{ 0%{transform:translateX(0);} 100%{transform:translateX(-100%);} }
  .bc-controls{display:flex; align-items:center; gap:7px; flex-shrink:0;}
  .bc-play{
    width:22px; height:22px; border-radius:50%; background:var(--amber-dim); color:var(--amber);
    display:flex; align-items:center; justify-content:center; font-size:9px; cursor:pointer;
  }
  .bc-wave{display:flex; align-items:flex-end; gap:2px; height:14px;}
  .wave-bar{width:2px; background:var(--amber); border-radius:1px; animation:wave 1s ease-in-out infinite;}
  .wave-bar:nth-child(1){animation-delay:0s;}
  .wave-bar:nth-child(2){animation-delay:.15s;}
  .wave-bar:nth-child(3){animation-delay:.3s;}
  .wave-bar:nth-child(4){animation-delay:.45s;}
  @keyframes wave{ 0%,100%{height:4px;} 50%{height:13px;} }

  /* ---- Session strip ---- */
  .session-strip{margin-top:12px;}
  .session-strip-label{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:10.5px; color:var(--text-mute); margin-bottom:6px;
  }
  .session-strip-label b{color:var(--text); font-weight:700;}
  .session-track{
    position:relative; height:32px; border-radius:6px; overflow:hidden;
    background:var(--panel); border:1px solid var(--line);
  }
  .session-block{
    position:absolute; top:0; bottom:0;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; letter-spacing:.03em; color:var(--text-mute);
  }
  .session-block.overlap{ background:var(--amber-dim); color:var(--amber); }
  .now-marker{ position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--text); z-index:5; }
  .now-marker::after{
    content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%);
    width:6px; height:6px; border-radius:50%; background:var(--text);
  }
  .session-legend{ display:flex; gap:11px; margin-top:8px; font-size:10px; color:var(--text-mute); flex-wrap:wrap; }
  .session-legend span{display:flex; align-items:center; gap:4px;}
  .legend-swatch{width:8px;height:8px;border-radius:2px;}

  /* ---- Layout / Zone system ---- */
  main{padding:16px 16px 4px; display:flex; flex-direction:column; gap:10px;}
  .category{display:flex; flex-direction:column;}
  .category-header{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:11px 13px; border-radius:8px; background:var(--panel-2); border:1px solid var(--line);
    cursor:pointer; user-select:none;
  }
  .category-title{display:flex; align-items:center; gap:9px; min-width:0;}
  .category-name{font-family:var(--serif); font-size:14px; font-weight:700; color:var(--text);}
  .category-sub{font-size:9.5px; color:var(--text-mute); font-weight:600;}
  .category-count{font-size:9.5px; color:var(--text-mute); font-weight:700; background:var(--panel); padding:2px 8px; border-radius:10px; border:1px solid var(--line); flex-shrink:0;}
  .category-chevron{font-size:11px; color:var(--text-mute); flex-shrink:0; transition:transform .25s ease;}
  .category.open .category-chevron{transform:rotate(90deg);}
  .category-body{display:none; flex-direction:column; gap:30px; padding:22px 0 6px;}
  .category.open .category-body{display:flex;}
  .zone{display:flex; flex-direction:column; gap:14px;}
  .zone-header{display:flex; align-items:flex-end; gap:10px;}
  .zone-index{
    font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:700;
    color:var(--zc); line-height:0.8; letter-spacing:-0.02em;
  }
  .zone-titles{display:flex; flex-direction:column; gap:2px;}
  .zone-name{font-family:var(--serif); font-size:17px; font-weight:700; letter-spacing:0.005em;}
  .zone-sub{font-size:9px; color:var(--text-mute); text-transform:uppercase; letter-spacing:.14em; font-weight:700;}
  .zone-rule{height:1px; background:linear-gradient(90deg, var(--zc) 0%, var(--line) 45%, transparent 100%); margin-top:-4px;}

  .zone-01{--zc:var(--z1);} .zone-02{--zc:var(--z2);} .zone-03{--zc:var(--z3);} .zone-04{--zc:var(--z4);}
  .zone-05{--zc:var(--z5);} .zone-06{--zc:var(--z6);} .zone-07{--zc:var(--z7);} .zone-08{--zc:var(--z8);}
  .zone-09{--zc:var(--z9);}
  .zone-10{--zc:var(--z10);}
  .zone-11{--zc:var(--z11);}
  .zone-12{--zc:var(--z12);}

  /* ---- Time horizon card ---- */
  .time-row{padding:13px 15px; border-bottom:1px solid var(--line-soft);}
  .time-row:last-child{border-bottom:none;}
  .time-head{display:flex; justify-content:space-between; align-items:center;}
  .time-label{font-size:13.5px; font-weight:800;}
  .time-label-sub{font-size:9px; color:var(--text-mute); font-weight:700; letter-spacing:.08em; margin-left:6px;}
  .time-badge{font-size:11px; font-weight:800; padding:4px 10px; border-radius:6px; flex-shrink:0;}
  .time-badge.long{background:var(--rise-dim); color:var(--rise);}
  .time-badge.short{background:var(--fall-dim); color:var(--fall);}
  .time-badge.range{background:var(--amber-dim); color:var(--amber);}
  .time-detail{font-size:11.5px; color:var(--text-soft); line-height:1.55; margin-top:8px;}
  .time-detail b{color:var(--text); font-weight:700;}
  .time-confluence{
    display:flex; align-items:flex-start; gap:8px; margin-top:2px;
    padding:11px; border-radius:7px; background:var(--z10-dim);
    font-size:11.5px; color:var(--text); line-height:1.5; font-weight:500;
  }
  .time-confluence .tag{color:var(--z10); font-weight:800; flex-shrink:0;}

  .subsection{display:flex; flex-direction:column; gap:9px;}
  .section-title{
    font-size:11px; font-weight:700; color:var(--text-mute);
    text-transform:uppercase; letter-spacing:.07em;
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-title .more{font-size:11px; color:var(--zc); font-weight:600; text-transform:none; letter-spacing:0;}

  .card{
    background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--zc);
    border-radius:var(--radius); padding:13px;
  }

  /* ---- Price hero ---- */
  .price-card{padding:17px 15px;}
  .price-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .price-label{font-size:11.5px; color:var(--text-mute); font-weight:600;}
  .price-value{font-size:32px; font-weight:700; margin-top:2px; letter-spacing:-0.01em; font-family:'IBM Plex Mono',monospace;}
  .price-delta{
    display:inline-flex; align-items:center; gap:4px; margin-top:6px;
    font-size:12.5px; font-weight:700; padding:3px 8px; border-radius:5px; font-family:'IBM Plex Mono',monospace;
  }
  .price-delta.up{color:var(--rise); background:var(--rise-dim);}
  .price-delta.down{color:var(--fall); background:var(--fall-dim);}
  .range-tabs{display:flex; gap:6px;}
  .range-tab{ font-size:10.5px; font-weight:600; color:var(--text-mute); padding:4px 8px; border-radius:5px; cursor:pointer; }
  .range-tab.active{background:var(--z1-dim); color:var(--amber);}

  /* ---- Overview strip (always-visible glance bar) ---- */
  .overview-strip{
    margin-top:12px; display:grid; grid-template-columns:repeat(4,1fr); gap:1px;
    background:var(--line); border:1px solid var(--line); border-radius:8px; overflow:hidden;
  }
  .ov-item{background:var(--panel); padding:8px 6px; text-align:center;}
  .ov-label{font-size:9px; color:var(--text-mute); font-weight:700; letter-spacing:.04em;}
  .ov-val{font-size:14px; font-weight:800; margin-top:2px; font-family:'IBM Plex Mono',monospace;}

  /* ---- Cross-source alert banner ---- */
  .cross-alert{
    display:none; align-items:flex-start; gap:9px; margin-top:10px;
    padding:11px 12px; border-radius:8px; background:var(--fall-dim); border:1px solid var(--fall);
    animation:pulse 2s infinite;
  }
  .cross-alert.show{display:flex;}
  .cross-alert .ca-icon{font-size:15px; flex-shrink:0; line-height:1.2;}
  .cross-alert .ca-text{font-size:11.5px; color:var(--fall); font-weight:700; line-height:1.5;}

  /* ---- Sticky quick-nav pills ---- */
  .quick-nav{ display:flex; gap:7px; margin-top:11px; overflow-x:auto; padding-bottom:2px; }
  .quick-nav::-webkit-scrollbar{display:none;}
  .qn-pill{
    flex-shrink:0; font-size:10.5px; font-weight:700; color:var(--text-soft);
    background:var(--panel-2); border:1px solid var(--line); border-radius:20px;
    padding:6px 12px; cursor:pointer; white-space:nowrap; border-width:1px; border-style:solid;
  }
  .qn-pill:active{background:var(--z1-dim); color:var(--amber); border-color:var(--amber);}

  /* ---- Data recency tag ---- */
  .data-tag{font-size:9px; color:var(--text-mute); font-weight:600;}
  .data-tag.lag{color:var(--amber);}
  .chart-wrap{margin-top:12px; height:150px;}
  .price-meta-row{
    display:flex; justify-content:space-between; margin-top:12px; padding-top:12px;
    border-top:1px solid var(--line-soft);
  }
  .price-meta{font-size:10.5px; color:var(--text-mute);}
  .price-meta b{display:block; color:var(--text); font-size:13px; margin-top:2px; font-weight:700; font-family:'IBM Plex Mono',monospace;}

  /* ---- Grid cards ---- */
  .macro-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .macro-card{ border:1px solid var(--line); border-left:3px solid var(--zc); border-radius:7px; padding:11px; background:var(--panel); display:flex; flex-direction:column; gap:6px; }
  .macro-head{display:flex; justify-content:space-between; align-items:center;}
  .macro-name{font-size:11px; font-weight:700; color:var(--text-soft);}
  .macro-badge{font-size:9px; font-weight:700; padding:1px 5px; border-radius:4px;}
  .macro-badge.pos{color:var(--rise); background:var(--rise-dim);}
  .macro-badge.neg{color:var(--fall); background:var(--fall-dim);}
  .macro-value{font-size:18px; font-weight:700; font-family:'IBM Plex Mono',monospace;}
  .macro-unit{font-size:9.5px; color:var(--text-mute); font-weight:600; margin-top:-4px;}
  .macro-spark{height:30px;}
  .macro-note{font-size:10px; color:var(--text-mute); line-height:1.5;}

  /* ---- Calendar / events ---- */
  .event-row{ display:flex; align-items:center; gap:7px; padding:8px 0; border-bottom:1px solid var(--line-soft); }
  .event-row:last-child{border-bottom:none; padding-bottom:0;}
  .event-time{font-size:10px; font-weight:700; color:var(--text); width:34px; flex-shrink:0; font-family:'IBM Plex Mono',monospace;}
  .event-impact{width:5px; height:5px; border-radius:50%; flex-shrink:0;}
  .impact-high{background:var(--fall);}
  .impact-mid{background:var(--amber);}
  .impact-low{background:var(--text-mute);}
  .event-body{flex:1; min-width:0;}
  .event-name{font-size:11.5px; font-weight:600; overflow-wrap:break-word;}
  .event-sub{font-size:9.5px; color:var(--text-mute); margin-top:1px; overflow-wrap:break-word;}
  .event-tag{ font-size:9px; font-weight:700; padding:2px 5px; border-radius:4px; background:var(--panel-2); color:var(--text-mute); flex-shrink:0; white-space:nowrap; }

  /* ---- Sentiment feed w/ 3-light system ---- */
  .sent-legend{font-size:9px; color:var(--text-mute); margin-bottom:2px; line-height:1.4;}
  .sent-item{ display:flex; gap:8px; padding:9px 0; border-bottom:1px solid var(--line-soft); }
  .sent-item:last-child{border-bottom:none; padding-bottom:0;}
  .sent-cat{ flex-shrink:0; width:42px; text-align:center; font-size:9px; font-weight:700; padding:3px 0; border-radius:5px; height:fit-content; }
  .cat-geo{background:var(--fall-dim); color:var(--fall);}
  .cat-trade{background:var(--amber-dim); color:var(--amber);}
  .cat-policy{background:var(--z2-dim); color:var(--z2);}
  .cat-blackswan{background:var(--z5); color:#fff;}
  .sent-body{flex:1; min-width:0;}
  .sent-text{font-size:11.5px; line-height:1.4; font-weight:500; color:var(--text); overflow-wrap:break-word;}
  .sent-meta{display:flex; align-items:center; justify-content:space-between; margin-top:5px; flex-wrap:wrap; gap:4px;}
  .sent-lights{display:flex; align-items:center; gap:5px;}
  .light{width:6px; height:6px; border-radius:50%; background:var(--line);}
  .light.on{background:var(--z2); box-shadow:0 0 5px var(--z2);}
  .sent-time{font-size:9.5px; color:var(--text-mute); font-family:'IBM Plex Mono',monospace;}

  /* ---- Fund flow ---- */
  .flow-row{ display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid var(--line-soft); }
  .flow-row:last-child{border-bottom:none; padding-bottom:0;}
  .flow-left{display:flex; align-items:center; gap:10px;}
  .flow-icon{
    width:30px; height:30px; border-radius:7px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; background:var(--zc); background:var(--z1-dim); color:var(--z1); font-weight:700;
  }
  .flow-name{font-size:12.5px; font-weight:600;}
  .flow-sub{font-size:10.5px; color:var(--text-mute); margin-top:1px;}
  .flow-right{text-align:right;}
  .flow-value{font-size:13px; font-weight:700; font-family:'IBM Plex Mono',monospace;}
  .flow-change{font-size:10.5px; font-weight:600; margin-top:1px;}

  /* ---- Risk day module ---- */
  .risk-card{padding:17px 15px;}
  .risk-top{display:flex; align-items:center; gap:16px;}
  .risk-gauge-wrap{position:relative; width:100px; height:62px; flex-shrink:0;}
  .risk-gauge-label{ position:absolute; bottom:0; left:50%; transform:translateX(-50%); text-align:center; }
  .risk-gauge-score{font-size:21px; font-weight:800; font-family:'IBM Plex Mono',monospace; line-height:1;}
  .risk-gauge-max{font-size:9.5px; color:var(--text-mute); font-weight:600;}
  .risk-info{flex:1; min-width:0;}
  .risk-badge{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:800; padding:5px 10px; border-radius:6px; margin-bottom:6px; }
  .risk-badge.range{background:var(--rise-dim); color:var(--rise);}
  .risk-badge.trend{background:var(--z1-dim); color:var(--amber);}
  .risk-badge.chaos{background:var(--fall-dim); color:var(--fall);}
  .risk-reason{font-size:11.5px; color:var(--text-soft); line-height:1.5;}
  .risk-metrics{ display:flex; flex-direction:column; gap:9px; margin-top:14px; padding-top:14px; border-top:1px solid var(--line-soft); }
  .risk-metric-row{display:flex; align-items:center; gap:10px;}
  .risk-metric-name{font-size:11px; color:var(--text-mute); width:62px; flex-shrink:0; font-weight:600;}
  .risk-metric-track{ flex:1; height:5px; border-radius:3px; background:var(--panel-2); overflow:hidden; }
  .risk-metric-fill{height:100%; border-radius:3px;}
  .risk-metric-val{ font-size:11px; font-family:'IBM Plex Mono',monospace; font-weight:600; width:30px; text-align:right; flex-shrink:0; color:var(--text-soft); }
  .risk-alert{
    display:flex; align-items:flex-start; gap:8px; margin-top:12px;
    padding:10px 11px; border-radius:7px; background:var(--fall-dim);
    font-size:11.5px; color:var(--fall); line-height:1.5; font-weight:600;
  }
  .risk-alert .dot{width:6px;height:6px;border-radius:50%;background:var(--fall); margin-top:5px; flex-shrink:0;}

  /* ---- Decision card ---- */
  .decision-card{padding:17px 15px;}
  .decision-stance{display:flex; align-items:center; justify-content:space-between;}
  .stance-badge{font-size:14px; font-weight:800; padding:7px 13px; border-radius:7px;}
  .stance-badge.wait{background:var(--amber-dim); color:var(--amber);}
  .stance-badge.long{background:var(--rise-dim); color:var(--rise);}
